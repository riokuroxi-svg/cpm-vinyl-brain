name: Brain CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Pruebas
        run: ./gradlew test

      - name: Crear distribución CLI
        run: ./gradlew installDist

      - name: Subir distribución
        uses: actions/upload-artifact@v4
        with:
          name: cpm-vinyl-brain-cli
          path: build/install/cpm-vinyl-brain/
